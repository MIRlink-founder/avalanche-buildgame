name: Deploy Production to Vercel

on:
  push:
    branches:
      - main

jobs:
  deploy-hospital-web:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_HOSPITAL_WEB_PROJECT_ID }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Generate Prisma Client
        run: npx nx run @mire/database:generate

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Pull Vercel Environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Configure vercel.json for hospital-web
        run: |
          echo '{"buildCommand":"npx nx run @mire/database:generate && npx nx build @mire/hospital-web","outputDirectory":"apps/hospital-web/.next","framework":"nextjs"}' > vercel.json

      - name: Build Project
        run: vercel build --prod

      - name: Deploy to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

  deploy-patient-web:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PATIENT_WEB_PROJECT_ID }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Generate Prisma Client
        run: npx nx run @mire/database:generate

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Pull Vercel Environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Configure vercel.json for patient-web
        run: |
          echo '{"buildCommand":"npx nx run @mire/database:generate && npx nx build @mire/patient-web","outputDirectory":"apps/patient-web/.next","framework":"nextjs"}' > vercel.json

      - name: Build Project
        run: vercel build --prod

      - name: Deploy to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
